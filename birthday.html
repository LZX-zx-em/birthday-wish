<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        /* 启动界面 */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .start-screen.hidden {
            opacity: 0;
            transform: scale(1.2);
            pointer-events: none;
        }
        .start-title {
            font-size: 48px;
            color: #e63946;
            margin-bottom: 40px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #e63946;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.3);
        }
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4);
        }
        /* 祝福卡片 */
        .birthday-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .birthday-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .title {
            color: #e63946;
            font-size: 32px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .message {
            font-size: 18px;
            line-height: 1.8;
            color: #333;
            margin: 30px 0;
        }
        .footer {
            color: #666;
            margin-top: 30px;
            font-size: 14px;
        }
        /* 烟花容器 */
        #fireworks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <!-- 启动界面 -->
    <div class="start-screen" id="startScreen">
        <h1 class="start-title">🎉 专属生日祝福 🎉</h1>
        <button class="start-btn" id="startBtn">点击开启祝福</button>
    </div>

    <!-- 祝福卡片 -->
    <div class="birthday-card" id="birthdayCard">
        <h1 class="title">生日快乐 🎉</h1>
        <div class="message">
            亲爱的老姐：<br>
            愿你的每一天都像生日一样快乐，<br>
            所有的美好和幸运都围绕着你，<br>
            新的一岁，平安喜乐，万事顺意！
        </div>
        <div class="footer">
            ✨ 专属生日祝福 ✨
        </div>
    </div>

    <!-- 烟花容器 -->
    <div id="fireworks-container"></div>

    <script>
        // 启动按钮逻辑
        const startScreen = document.getElementById('startScreen');
        const birthdayCard = document.getElementById('birthdayCard');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', () => {
            // 隐藏启动界面
            startScreen.classList.add('hidden');
            // 显示祝福卡片
            setTimeout(() => {
                birthdayCard.classList.add('visible');
                // 延迟1秒后触发烟花
                setTimeout(() => {
                    launchFireworks();
                }, 1000);
            }, 800);
        });

        // 烟花效果实现
        function launchFireworks() {
            const container = document.getElementById('fireworks-container');
            
            // 创建烟花粒子
            function createParticle(x, y, color) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = '4px';
                particle.style.height = '4px';
                particle.style.background = color;
                particle.style.borderRadius = '50%';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                container.appendChild(particle);

                // 粒子动画
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                let opacity = 1;
                let gravity = 0.05;

                function update() {
                    if (opacity <= 0) {
                        particle.remove();
                        return;
                    }
                    particle.style.left = (parseFloat(particle.style.left) + vx) + 'px';
                    particle.style.top = (parseFloat(particle.style.top) + vy + gravity) + 'px';
                    opacity -= 0.01;
                    gravity += 0.02;
                    particle.style.opacity = opacity;
                    requestAnimationFrame(update);
                }
                update();
            }

            // 发射烟花
            function fire() {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight * 0.5;
                const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                for (let i = 0; i < 80; i++) {
                    createParticle(x, y, color);
                }
            }

            // 连续发射3次烟花
            fire();
            setTimeout(fire, 800);
            setTimeout(fire, 1600);
        }
    </script>
</body>
</html>
